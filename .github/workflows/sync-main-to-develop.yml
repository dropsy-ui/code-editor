name: Sync main to develop

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.workflow_run.conclusion == 'success' && github.repository_owner == 'dropsy-ui'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create sync pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: chore/sync-main-to-develop
          title: "chore: sync main into develop"
          body: |
            Automated sync after a successful release.
            This PR is intentionally reviewable and auditable.
          commit-message: "chore: sync main into develop"
          labels: automated,sync
